<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Payer un devis — DayZ Mapping Lab</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">

  <a class="brand" href="/">
    <span class="logo">DML</span>

    <span>
      <strong>DayZ Mapping Lab</strong>
      <small>Paiement de devis sécurisé</small>
    </span>
  </a>

  <button class="burger" id="burger">☰</button>

  <nav id="nav">
    <a href="/">Accueil</a>
    <a href="/#packs">Offres</a>
    <a href="/#contact">Contact</a>
  </nav>

</header>

<main class="page">

  <p class="eyebrow">Paiement personnalisé</p>

  <h1>Payer un devis validé</h1>

  <p class="legal">
    Cette page sert uniquement aux devis créés et validés par DayZ Mapping Lab.
    Le montant est verrouillé automatiquement.
  </p>

  <section class="hero-card quote-box">

    <label>Rechercher votre devis</label>

    <input
      id="quoteId"
      placeholder="Nom, email ou numéro de devis"
    >

    <div class="actions">
      <button class="btn" id="loadQuote">
        Rechercher
      </button>
    </div>

    <div id="quoteResult" class="quote-result"></div>

  </section>

</main>

<footer>
  <p>
    © 2026 DayZ Mapping Lab™ — une marque exploitée par TyamiDev.
  </p>
</footer>

<script src="app.js"></script>

<script>

const params = new URLSearchParams(location.search);

if (params.get("id")) {
  document.getElementById("quoteId").value = params.get("id");
}

const result = document.getElementById("quoteResult");

document.getElementById("loadQuote").onclick = loadQuote;

function formatDescription(text = "") {

  const clean = String(text).trim();

  if (!clean) {
    return "<p class='muted'>Aucune description.</p>";
  }

  const parts = clean
    .split(/\n| - |\+|•|→/)
    .map(item => item.trim())
    .filter(Boolean);

  if (parts.length <= 1) {
    return `<p class="muted">${clean}</p>`;
  }

  return `
    <ul class="quote-description-list">
      ${parts.map(item => `<li>${item}</li>`).join("")}
    </ul>
  `;
}

async function loadQuote() {
  const query = document.getElementById("quoteId").value.trim();

  if (!query) {
    return alert("Indiquez votre nom, email ou numéro de devis.");
  }

  result.innerHTML = `<p class="muted">Recherche du devis...</p>`;

  try {
    const response = await fetch(
      "/api/quote-search?q=" + encodeURIComponent(query)
    );

    const quotes = await response.json();

    if (!response.ok) {
      throw new Error(quotes.error || "Aucun devis trouvé");
    }

    result.innerHTML = quotes.map(q => `
      <div class="quote-client-card">

        <div class="quote-top">
          <div>
            <p class="quote-ref">Référence ${q.id}</p>
            <h2>Devis de ${q.customerName || "Client"}</h2>
          </div>

          <span class="badge ${q.status}">
            ${q.status}
          </span>
        </div>

        <div class="quote-info-grid">
          <div class="quote-info">
            <span>Service</span>
            <strong>${q.service || "Projet personnalisé"}</strong>
          </div>

          <div class="quote-info">
            <span>Montant</span>
            <strong class="quote-price">${q.amount}€</strong>
          </div>
        </div>

        <button class="btn ghost quote-toggle-btn" onclick="toggleClientQuoteDetails('${q.id}')">
          Voir la description
        </button>

        <div id="client-quote-details-${q.id}" class="client-quote-details hidden">
          <div class="quote-description-block">
            <h3>Description du devis</h3>
            ${formatDescription(q.description)}
          </div>
        </div>

        <button class="btn big-btn" onclick="payQuote('${q.id}')">
          Payer ce devis
        </button>

      </div>
    `).join("");

  } catch (e) {
    result.innerHTML = `<p class="status">${e.message}</p>`;
  }
}

window.toggleClientQuoteDetails = toggleClientQuoteDetails;
window.payQuote = payQuote;

if (params.get("id")) {
  loadQuote();
}
</script>
</body>
</html>
